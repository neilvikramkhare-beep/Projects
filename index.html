<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>React Props & State Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #74ebd5, #acb6e5);
            min-height: 100vh;
        }

        .container-box {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        h2 {
            font-weight: bold;
            color: #333;
        }

        .btn {
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div id="root" class="container mt-5"></div>
    <script type="text/babel">
        const { useState } = React;
        function UserCard({ name, age }) {
            return (
                <div className="card text-center shadow mb-3">
                    <div className="card-body">
                        <h5 className="card-title">User Details</h5>
                        <p><strong>Name:</strong> {name}</p>
                        <p><strong>Age:</strong> {age}</p>
                    </div>
                </div>
            );
        }
        function UserStats({ clicks }) {
            return (
                <div className="card text-center shadow mb-3">
                    <div className="card-body">
                        <h5>User Stats</h5>
                        <p><strong>Button Clicks:</strong> {clicks}</p>
                    </div>
                </div>
            );
        }
        function UserActions({ onIncrease, onDecrease, onClickCount }) {
            return (
                <div className="text-center mt-3">
                    <button className="btn btn-success m-2" onClick={() => { onIncrease(); onClickCount(); }}>
                        Increase Age
                    </button>
                    <button className="btn btn-danger m-2" onClick={() => { onDecrease(); onClickCount(); }}>
                        Decrease Age
                    </button>
                    <button className="btn btn-warning m-2" onClick={onClickCount}>
                        Count Click
                    </button>
                </div>
            );
        }
        function App() {
            const [user, setUser] = useState({ name: "Alex", age: 25, clicks: 0 });
            const updateAge = () => setUser({ ...user, age: user.age + 1 });
            const decreaseAge = () => setUser({ ...user, age: user.age - 1 });
            const incrementClicks = () => setUser({ ...user, clicks: user.clicks + 1 });
            return (
                <div className="container-box">
                    <h2 className="text-center mb-4">React Props & State Example</h2>
                    <UserCard name={user.name} age={user.age} />
                    <UserStats clicks={user.clicks} />
                    <UserActions
                        onIncrease={updateAge}
                        onDecrease={decreaseAge}
                        onClickCount={incrementClicks}
                    />
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
